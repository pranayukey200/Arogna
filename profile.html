<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Arogna - Patient Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-primary": "#adc7ff",
                      "on-primary": "#ffffff",
                      "on-error-container": "#93000a",
                      "on-background": "#181c20",
                      "inverse-surface": "#2d3135",
                      "on-tertiary-fixed": "#141d23",
                      "primary-fixed": "#d8e2ff",
                      "surface-container-low": "#f1f4f9",
                      "secondary-fixed": "#ffdad9",
                      "surface": "#f7f9ff",
                      "on-primary-fixed": "#001a41",
                      "on-secondary-fixed": "#410008",
                      "tertiary": "#545d65",
                      "outline": "#717786",
                      "primary": "#0059bb",
                      "surface-container": "#ebeef3",
                      "secondary-fixed-dim": "#ffb3b2",
                      "surface-dim": "#d7dadf",
                      "primary-fixed-dim": "#adc7ff",
                      "on-error": "#ffffff",
                      "on-secondary-container": "#fffbff",
                      "surface-tint": "#005bc0",
                      "primary-container": "#0070ea",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary-container": "#fcfcff",
                      "surface-container-high": "#e5e8ee",
                      "surface-bright": "#f7f9ff",
                      "on-surface": "#181c20",
                      "error-container": "#ffdad6",
                      "surface-container-highest": "#e0e3e8",
                      "on-surface-variant": "#414754",
                      "inverse-on-surface": "#eef1f6",
                      "on-secondary-fixed-variant": "#92001f",
                      "on-primary-container": "#fefcff",
                      "on-tertiary-fixed-variant": "#3f484f",
                      "on-secondary": "#ffffff",
                      "surface-variant": "#e0e3e8",
                      "outline-variant": "#c1c6d7",
                      "tertiary-fixed": "#dbe4ed",
                      "background": "#f7f9ff",
                      "tertiary-container": "#6d767e",
                      "error": "#ba1a1a",
                      "tertiary-fixed-dim": "#bfc8d0",
                      "secondary-container": "#d93343",
                      "on-tertiary": "#ffffff",
                      "secondary": "#b6152e",
                      "on-primary-fixed-variant": "#004493"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base": "8px",
                      "gutter": "24px",
                      "xs": "4px",
                      "sm": "12px",
                      "md": "16px",
                      "lg": "24px",
                      "xl": "32px",
                      "margin": "24px"
              },
              "fontFamily": {
                      "label-lg": ["Inter"],
                      "body-md": ["Inter"],
                      "headline-md": ["Inter"],
                      "display-lg": ["Inter"],
                      "label-md": ["Inter"],
                      "title-lg": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-lg": ["Inter"]
              },
              "fontSize": {
                      "label-lg": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-md": ["11px", {"lineHeight": "16px", "fontWeight": "500"}],
                      "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: #c1c6d7;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest min-h-screen flex flex-col font-sans antialiased text-on-surface">
<!-- Top Navigation Shell - Simplified for Linear Flow -->
<header class="w-full flex items-center justify-between px-6 py-4 sticky top-0 z-50 bg-surface-container-lowest border-b border-surface-variant">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<span class="text-xl font-bold tracking-tight text-primary font-title-lg text-title-lg">Arogna</span>
</div>
<!-- Right side empty to maintain focus on registration -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full flex items-center justify-center p-lg md:p-xl">
<!-- Registration Card Container (Level 1 Elevation) -->
<div class="w-full max-w-[520px] bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-surface-variant p-xl flex flex-col gap-xl">
<!-- Header Section -->
<div class="flex flex-col items-center text-center gap-xs">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-on-primary-fixed text-2xl">person_add</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface m-0">Patient Registration</h1>
<p class="font-body-md text-body-md text-on-surface-variant m-0 max-w-sm">
                    Please enter your clinical details to establish your secure medical profile.
                </p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-lg w-full">
<!-- Full Name Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="fullName">Legal Full Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline-variant pointer-events-none">person</span>
<input class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="fullName" placeholder="e.g. Jane Doe" required="" type="text"/>
</div>
</div>
<!-- Blood Group Dropdown -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="bloodGroup">Blood Group</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline-variant pointer-events-none">bloodtype</span>
<select class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface appearance-none focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all cursor-pointer" id="bloodGroup" required="">
<option class="text-outline-variant" disabled="" selected="" value="">Select Classification</option>
<option value="A+">A Positive (A+)</option>
<option value="A-">A Negative (A-)</option>
<option value="B+">B Positive (B+)</option>
<option value="B-">B Negative (B-)</option>
<option value="AB+">AB Positive (AB+)</option>
<option value="AB-">AB Negative (AB-)</option>
<option value="O+">O Positive (O+)</option>
<option value="O-">O Negative (O-)</option>
</select>
<span class="material-symbols-outlined absolute right-md text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Medical History Textarea -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="medicalHistory">Medical History (Optional)</label>
<div class="relative">
<textarea class="w-full px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all resize-y min-h-[80px]" id="medicalHistory" placeholder="List existing conditions, severe allergies, or recent procedures..." rows="3"></textarea>
</div>
</div>
<!-- Emergency Contacts -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="emergencyContact">Emergency Contacts</label>
<div class="flex items-center gap-sm">
<div class="relative flex-1 flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline-variant pointer-events-none">call</span>
<input class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="emergencyContact" placeholder="Phone Number" type="tel"/>
</div>
<button class="flex items-center justify-center gap-xs px-md py-sm h-[44px] bg-surface-container border border-outline-variant rounded-lg font-label-lg text-label-lg text-on-surface hover:bg-surface-variant active:scale-95 transition-all" type="button">
<span class="material-symbols-outlined text-[18px]">add</span>
                            Add
                        </button>
</div>
<!-- Mocked added contact chip -->
<div class="flex flex-wrap gap-xs mt-xs">
<div class="inline-flex items-center gap-xs bg-surface-container-high px-sm py-[6px] rounded-full border border-surface-variant">
<span class="font-label-md text-label-md text-on-surface">+1 (555) 019-2834</span>
<button class="flex items-center justify-center text-outline hover:text-error transition-colors rounded-full p-[2px]" type="button">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
</div>
</div>
<!-- Divider -->
<hr class="border-surface-variant my-sm w-full"/>
<!-- Submit Action -->
<button class="w-full flex items-center justify-center gap-sm py-[14px] bg-primary text-on-primary rounded-xl font-label-lg text-label-lg hover:bg-surface-tint shadow-sm active:scale-[0.98] transition-all" type="submit">
                    Complete Registration
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<div class="flex items-center justify-center gap-xs text-outline font-label-md text-label-md mt-xs">
<span class="material-symbols-outlined text-[14px]">lock</span>
                    End-to-end encrypted medical data
                </div>
</form>
</div>
</main>
</body></html>
